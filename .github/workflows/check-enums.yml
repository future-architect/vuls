name: Check vuls-data-update enums

# Deliberately NOT triggered by pull_request: this checks a repository-wide
# condition (is the pinned vuls-data-update behind nightly?), not anything a
# PR author controls — running it per PR would fail unrelated work (incl.
# dependabot) whenever upstream drifts, and would permanently block hotfix
# PRs on maintenance lines whose pins are legitimately old. The daily cron is
# the drift alarm; use workflow_dispatch to check on demand (e.g. while
# preparing a bump PR).
on:
  workflow_dispatch:
  schedule:
    - cron: '37 21 * * *'

permissions:
  contents: read

jobs:
  enum-diff:
    name: Enum list diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # The extracted-data schema's enum vocabularies are lenient at
      # unmarshal: data carrying values this build does not know is read
      # losslessly but skipped (with a warning on the scan result) at
      # detection. This job fails when the vuls-data-update pinned in go.mod
      # knows fewer enum values than the nightly branch — i.e. when a
      # dependency bump is due before data produced with the new values
      # reaches detection. The known sets are append-only, so a plain diff
      # suffices.
      - name: Diff known enum sets against vuls-data-update nightly
        id: diff
        shell: bash
        env:
          GOEXPERIMENT: jsonv2
        run: |
          diff <(go run github.com/MaineK00n/vuls-data-update/tools/print-enums) \
               <(go run github.com/MaineK00n/vuls-data-update/tools/print-enums@nightly) | tee /tmp/enum.diff

      # Drift is a state, not an event: it persists until a bump PR merges,
      # so the alarm is one open issue (deduplicated by label) rather than a
      # notification that depends on someone's settings. Assignees are the
      # vuls2-integration maintainers.
      - name: File a drift issue
        if: failure() && steps.diff.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create enum-drift --force --description "vuls-data-update enum vocabulary drift" --color D93F0B
          if [ -z "$(gh issue list -R "$GITHUB_REPOSITORY" --label enum-drift --state open --json number --jq '.[].number')" ]; then
            {
              printf 'The scheduled check-enums run failed: the vuls-data-update pinned in go.mod knows fewer enum values than the nightly branch. A dependency bump is due before data produced with the new values reaches detection.\n\n'
              printf '```diff\n'
              cat /tmp/enum.diff
              printf '```\n\nRun: %s\n' "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            } > /tmp/enum-issue.md
            gh issue create -R "$GITHUB_REPOSITORY" --title "vuls-data-update enum vocabulary drift" --label enum-drift --assignee MaineK00n,shino --body-file /tmp/enum-issue.md
          fi
