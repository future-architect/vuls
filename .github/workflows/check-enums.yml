name: Check vuls-data-update enums

# Deliberately NOT triggered by pull_request: this checks a repository-wide
# condition (is the pinned vuls-data-update behind nightly?), not anything a
# PR author controls — running it per PR would fail unrelated work (incl.
# dependabot) whenever upstream drifts, and would permanently block hotfix
# PRs on maintenance lines whose pins are legitimately old. The daily cron is
# the drift alarm; use workflow_dispatch to check on demand (e.g. while
# preparing a bump PR).
on:
  workflow_dispatch:
  schedule:
    - cron: '37 21 * * *'

permissions:
  contents: read

jobs:
  enum-diff:
    name: Enum list diff
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # The extracted-data schema's enum vocabularies are lenient at
      # unmarshal: data carrying values this build does not know is read
      # losslessly but skipped (with a warning on the scan result) at
      # detection. This job fails when the vuls-data-update pinned in go.mod
      # knows fewer enum values than the nightly branch — i.e. when a
      # dependency bump is due before data produced with the new values
      # reaches detection. The known sets are append-only, so a plain diff
      # suffices.
      - name: Diff known enum sets against vuls-data-update nightly
        env:
          GOEXPERIMENT: jsonv2
        run: |
          diff <(go run github.com/MaineK00n/vuls-data-update/tools/print-enums) \
               <(go run github.com/MaineK00n/vuls-data-update/tools/print-enums@nightly)
