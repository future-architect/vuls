name: Test

on: [pull_request]

permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    # Fetch the integration test data (lockfile fixtures, jar/war binaries).
    # Pinned by commit SHA — bump this ref to update test data, equivalent to
    # advancing a submodule pointer. Do NOT use `submodules: true` on the
    # checkout above: that reads .gitmodules from the PR head and a fork PR
    # could redirect the URL to attacker-controlled code that `go test` would
    # then execute. The SHA pin here lives in the workflow file, which a PR
    # cannot redirect without a reviewable diff.
    - name: Check out integration test data
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: vulsio/integration
        ref: 4b31364e44192a39ab4b84f0344da1fbc9f60e24
        path: integration
        persist-credentials: false
    - name: Set up Go 1.x
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: go mod tidy check
      run: go mod tidy && git diff --exit-code
    - name: Test
      run: make test
